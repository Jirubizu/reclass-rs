name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# `vmem` is a public git dependency (see root Cargo.toml); cargo fetches it
# during the build, so no extra checkout is needed.

jobs:
  build-test:
    name: fmt + clippy + test + bench-compile
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test (all features)
        # ptrace-based tests need an unrestricted ptrace scope.
        run: |
          sudo sysctl -w kernel.yama.ptrace_scope=0 || true
          cargo test --workspace --all-features

      - name: bench compile-check
        run: cargo bench -p reclass-core --bench engine --no-run

  release-build:
    name: release build (GUI binary)
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libfontconfig-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --package reclass

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: reclass-linux-x86_64
          path: target/release/reclass
  create-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-build]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog range

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: reclass-linux-x86_64

      - name: Generate changelog
        run: |
          # Previous v* release reachable from HEAD, excluding the current tag.
          prev=$(git tag --list 'v*' --sort=-v:refname --merged HEAD \
                   | grep -vFx "$GITHUB_REF_NAME" | head -n1)
          if [ -n "$prev" ]; then
            printf '## Changes since %s\n\n' "$prev" > /tmp/changelog.md
            range="$prev..HEAD"
          else
            printf '## Changes\n\n' > /tmp/changelog.md
            range=HEAD
          fi
          git log --no-merges --reverse --pretty='* %s' "$range" >> /tmp/changelog.md
          cat /tmp/changelog.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          body_path: /tmp/changelog.md
          files: reclass
