name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# `vmem` is a public git dependency (see root Cargo.toml); cargo fetches it
# during the build, so no extra checkout is needed.

jobs:
  build-test:
    name: fmt + clippy + test + bench-compile
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test (all features)
        # ptrace-based tests need an unrestricted ptrace scope.
        run: |
          sudo sysctl -w kernel.yama.ptrace_scope=0 || true
          cargo test --workspace --all-features

      - name: bench compile-check
        run: cargo bench -p reclass-core --bench engine --no-run

  release-build:
    name: release build (GUI binary)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libfontconfig-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --package reclass

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: reclass-linux-x86_64
          path: target/release/reclass
  create-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-build]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: reclass-linux-x86_64

      - name: Generate changelog from push commits
        env:
          # Pass the commits JSON through the environment, NOT spliced into the
          # shell source: a commit message containing a quote/backtick would
          # otherwise break `echo '<json>'` (and allow script injection).
          COMMITS: ${{ toJson(github.event.commits) }}
        run: |
          printf '%s' "${COMMITS:-[]}" |
          jq -r '(. // []) | .[] | select(.distinct) | "* " + (.message | split("\n")[0])' > /tmp/changelog.md
          { cat /tmp/changelog.md; echo; } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous build
          body_path: /tmp/changelog.md
          files: reclass
          make_latest: true
